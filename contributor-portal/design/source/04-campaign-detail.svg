<svg xmlns="http://www.w3.org/2000/svg" width="680" height="580" viewBox="0 0 680 580">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif; }</style>
  </defs>

  <!-- White base -->
  <rect width="680" height="580" fill="#ffffff"/>

  <!-- ── HEADER (0..90, gray) ── -->
  <rect x="0" y="0" width="680" height="90" fill="#f5f5f5"/>
  <text x="24" y="26" font-size="11" fill="#999999">frontier: Robotics</text>
  <text x="24" y="52" font-size="20" font-weight="700" fill="#000000">Embodiment-X Data Collection</text>
  <text x="24" y="72" font-size="11" fill="#555555">Mar 1, 2026 &#8594; Jun 1, 2026 &#183; Phase-1 &#183; 49% complete</text>

  <!-- Live badge -->
  <rect x="590" y="42" width="66" height="24" rx="12" fill="#dcfce7"/>
  <text x="623" y="58" font-size="11" font-weight="700" fill="#166534" text-anchor="middle">&#11044; Live</text>

  <!-- Section divider -->
  <line x1="0" y1="90" x2="680" y2="90" stroke="#000000" stroke-width="1.5"/>

  <!-- ── TASK PIPELINE OVERVIEW (90..145) ── -->
  <text x="24" y="113" font-size="13" font-weight="700" fill="#000000">Task Pipeline</text>

  <!-- Mini pipeline: 4 small boxes at y=120..143 -->
  <!-- box_w=141, gap=8, start=24 -->
  <rect x="24"  y="120" width="141" height="24" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="94"  y="136" font-size="10" font-weight="500" fill="#000000" text-anchor="middle">T1: Data Supply</text>

  <rect x="173" y="120" width="141" height="24" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="243" y="136" font-size="10" font-weight="500" fill="#000000" text-anchor="middle">T2: Vision Processing</text>

  <rect x="322" y="120" width="141" height="24" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="392" y="136" font-size="10" font-weight="500" fill="#000000" text-anchor="middle">T3: Annotation</text>

  <rect x="471" y="120" width="141" height="24" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="541" y="136" font-size="10" font-weight="500" fill="#000000" text-anchor="middle">T4: Validation</text>

  <!-- Arrows between boxes -->
  <text x="167" y="136" font-size="10" fill="#999999" text-anchor="middle">&#8594;</text>
  <text x="316" y="136" font-size="10" fill="#999999" text-anchor="middle">&#8594;</text>
  <text x="465" y="136" font-size="10" fill="#999999" text-anchor="middle">&#8594;</text>

  <!-- Section divider -->
  <line x1="0" y1="155" x2="680" y2="155" stroke="#000000" stroke-width="1.5"/>

  <!-- ── TASK DETAILS (155..385) ── -->
  <text x="24" y="178" font-size="13" font-weight="700" fill="#000000">Task Details</text>

  <!-- 2x2 grid of task cards: card_w=304, gap=16, start_x=24 -->
  <!-- Row 1: y=188..268 (80px each) -->
  <!-- T1 card -->
  <rect x="24"  y="188" width="304" height="80" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="24"  y="188" width="304" height="26" fill="#f9fafb"/>
  <text x="38"  y="205" font-size="11" font-weight="700" fill="#000000">T1 — Data Supply</text>
  <rect x="286" y="194" width="34" height="16" rx="8" fill="#dbeafe"/>
  <text x="303" y="205" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">Human</text>
  <text x="38"  y="228" font-size="11" fill="#555555">Upload video footage of robot manipulation</text>
  <text x="38"  y="244" font-size="11" fill="#555555">tasks. Supported: MP4, MOV, ROS bag.</text>
  <text x="38"  y="262" font-size="11" fill="#3b82f6">Upload video &#8594;</text>

  <!-- T2 card -->
  <rect x="344" y="188" width="304" height="80" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="344" y="188" width="304" height="26" fill="#f9fafb"/>
  <text x="358" y="205" font-size="11" font-weight="700" fill="#000000">T2 — Vision Processing</text>
  <rect x="598" y="194" width="38" height="16" rx="8" fill="#f3e8ff"/>
  <text x="617" y="205" font-size="9" font-weight="600" fill="#7c3aed" text-anchor="middle">Agent</text>
  <text x="358" y="228" font-size="11" fill="#555555">Automated YOLO detection, pose estimation,</text>
  <text x="358" y="244" font-size="11" fill="#555555">and motion segmentation via Vision Engine.</text>
  <text x="358" y="262" font-size="11" fill="#999999">No action required &#183; ~2 min processing</text>

  <!-- Row 2: y=272..352 -->
  <!-- T3 card -->
  <rect x="24"  y="272" width="304" height="80" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="24"  y="272" width="304" height="26" fill="#f9fafb"/>
  <text x="38"  y="289" font-size="11" font-weight="700" fill="#000000">T3 — Human Annotation</text>
  <rect x="286" y="278" width="34" height="16" rx="8" fill="#dbeafe"/>
  <text x="303" y="289" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">Human</text>
  <text x="38"  y="312" font-size="11" fill="#555555">Label action segments, draw bboxes, add</text>
  <text x="38"  y="328" font-size="11" fill="#555555">language instructions and task plans.</text>
  <text x="38"  y="346" font-size="11" fill="#3b82f6">Annotate clip &#8594;</text>

  <!-- T4 card -->
  <rect x="344" y="272" width="304" height="80" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="344" y="272" width="304" height="26" fill="#f9fafb"/>
  <text x="358" y="289" font-size="11" font-weight="700" fill="#000000">T4 — Label Validation</text>
  <rect x="286+318" y="278" width="34" height="16" rx="8" fill="#dbeafe"/>
  <rect x="598" y="278" width="34" height="16" rx="8" fill="#dbeafe"/>
  <text x="615" y="289" font-size="9" font-weight="600" fill="#1d4ed8" text-anchor="middle">Human</text>
  <text x="358" y="312" font-size="11" fill="#555555">Peer-review completed annotations. Grade</text>
  <text x="358" y="328" font-size="11" fill="#555555">quality and flag issues (S/A/B/C/D).</text>
  <text x="358" y="346" font-size="11" fill="#3b82f6">Review annotations &#8594;</text>

  <!-- Section divider -->
  <line x1="0" y1="368" x2="680" y2="368" stroke="#000000" stroke-width="1.5"/>

  <!-- ── COMPENSATION (368..524) ── -->
  <text x="24" y="392" font-size="13" font-weight="700" fill="#000000">Compensation</text>

  <!-- Table headers -->
  <text x="24"  y="416" font-size="11" font-weight="600" fill="#999999">TASK</text>
  <text x="200" y="416" font-size="11" font-weight="600" fill="#999999">REWARD TYPE</text>
  <text x="360" y="416" font-size="11" font-weight="600" fill="#999999">AMOUNT</text>
  <text x="480" y="416" font-size="11" font-weight="600" fill="#999999">CONDITIONS</text>
  <line x1="24" y1="422" x2="656" y2="422" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Row 1: T1 -->
  <text x="24"  y="442" font-size="11" fill="#000000">T1 Data Supply</text>
  <circle cx="208" cy="437" r="8" fill="#3b82f6"/>
  <text x="208" y="437" font-size="8" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">$</text>
  <text x="222" y="442" font-size="11" fill="#555555">Token</text>
  <text x="360" y="442" font-size="12" font-weight="600" fill="#000000">0.50 USDC</text>
  <text x="480" y="442" font-size="11" fill="#555555">Per accepted video upload</text>
  <line x1="24" y1="450" x2="656" y2="450" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row 2: T2 -->
  <text x="24"  y="470" font-size="11" fill="#999999">T2 Vision Processing</text>
  <text x="200" y="470" font-size="11" fill="#999999">Automated</text>
  <text x="360" y="470" font-size="11" fill="#999999">&#8212;</text>
  <text x="480" y="470" font-size="11" fill="#999999">Agent task, no reward</text>
  <line x1="24" y1="478" x2="656" y2="478" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row 3: T3 -->
  <text x="24"  y="498" font-size="11" fill="#000000">T3 Human Annotation</text>
  <circle cx="208" cy="493" r="8" fill="#3b82f6"/>
  <text x="208" y="493" font-size="8" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">$</text>
  <text x="222" y="498" font-size="11" fill="#555555">Token</text>
  <text x="360" y="498" font-size="12" font-weight="600" fill="#000000">2.00 USDC</text>
  <text x="480" y="498" font-size="11" fill="#555555">Per approved annotation set</text>
  <line x1="24" y1="506" x2="656" y2="506" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row 4: T4 -->
  <text x="24"  y="526" font-size="11" fill="#000000">T4 Label Validation</text>
  <circle cx="208" cy="521" r="8" fill="#3b82f6"/>
  <text x="208" y="521" font-size="8" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">$</text>
  <text x="222" y="526" font-size="11" fill="#555555">Token</text>
  <text x="360" y="526" font-size="12" font-weight="600" fill="#000000">0.50 USDC</text>
  <text x="480" y="526" font-size="11" fill="#555555">Per completed review task</text>

  <!-- NFT Attribution note -->
  <rect x="24" y="548" width="632" height="22" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="24"  y="563" font-size="10" fill="#7c3aed">          + NFT attribution badge for all contributors with quality grade A or above &#183; On-chain lineage record</text>

  <!-- Card outer border -->
  <rect x="0.75" y="0.75" width="678.5" height="578.5" fill="none" stroke="#000000" stroke-width="1.5"/>
</svg>
