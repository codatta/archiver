<svg xmlns="http://www.w3.org/2000/svg" width="680" height="540" viewBox="0 0 680 540">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif; }</style>
  </defs>

  <!-- White base -->
  <rect width="680" height="540" fill="#ffffff"/>

  <!-- ── HEADER (0..90, gray) ── -->
  <rect x="0" y="0" width="680" height="90" fill="#f5f5f5"/>
  <text x="24" y="26" font-size="11" fill="#999999">Enrolling in</text>
  <text x="24" y="52" font-size="20" font-weight="700" fill="#000000">Embodiment-X Data Collection</text>
  <text x="24" y="72" font-size="11" fill="#555555">LeRobot &#183; frontier: Robotics &#183; Phase-1 in progress</text>

  <!-- Section divider -->
  <line x1="0" y1="90" x2="680" y2="90" stroke="#000000" stroke-width="1.5"/>

  <!-- ── OVERVIEW (90..160) ── -->
  <text x="24" y="116" font-size="12" fill="#555555">Collect and annotate robotics manipulation footage. Contribute to embodied AI research by</text>
  <text x="24" y="132" font-size="12" fill="#555555">uploading and labeling video clips of manipulation tasks performed by a robot arm.</text>

  <!-- Info badges row -->
  <!-- Badge 1: time -->
  <rect x="24"  y="146" width="138" height="28" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="1"/>
  <text x="93"  y="164" font-size="11" fill="#555555" text-anchor="middle">&#9201; ~45 min / session</text>

  <!-- Badge 2: reward -->
  <rect x="170" y="146" width="150" height="28" fill="#f5f5f5" stroke="#e5e7eb" stroke-width="1"/>
  <text x="245" y="164" font-size="11" fill="#555555" text-anchor="middle">&#128176; Up to 2.50 USDC</text>

  <!-- Badge 3: spots -->
  <rect x="328" y="146" width="140" height="28" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="398" y="164" font-size="11" fill="#c2410c" text-anchor="middle">&#9889; 20 spots remaining</text>

  <!-- Section divider -->
  <line x1="0" y1="186" x2="680" y2="186" stroke="#000000" stroke-width="1.5"/>

  <!-- ── PREREQUISITES CHECKLIST (186..340) ── -->
  <text x="24" y="212" font-size="14" font-weight="700" fill="#000000">Before you begin</text>
  <text x="24" y="230" font-size="11" fill="#999999">Complete all requirements to unlock the qualification exam.</text>

  <!-- Item 1: checked -->
  <circle cx="40"  cy="258" r="10" fill="#22c55e"/>
  <line   x1="35" y1="258" x2="38" y2="262" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line   x1="38" y1="262" x2="46" y2="252" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="263" font-size="12" fill="#000000">Complete your contributor profile</text>
  <text x="558" y="263" font-size="11" fill="#22c55e" font-weight="600" text-anchor="end">Done</text>

  <!-- Item 2: checked -->
  <circle cx="40"  cy="288" r="10" fill="#22c55e"/>
  <line   x1="35" y1="288" x2="38" y2="292" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line   x1="38" y1="292" x2="46" y2="282" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="293" font-size="12" fill="#000000">Agree to data privacy and usage terms</text>
  <text x="558" y="293" font-size="11" fill="#22c55e" font-weight="600" text-anchor="end">Done</text>

  <!-- Item 3: unchecked -->
  <circle cx="40" cy="318" r="10" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="60" y="323" font-size="12" fill="#555555">Review equipment requirements</text>

  <!-- Item 4: unchecked -->
  <circle cx="40" cy="348" r="10" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="60" y="353" font-size="12" fill="#555555">Watch the 5-minute intro video</text>
  <text x="558" y="353" font-size="11" fill="#3b82f6" text-anchor="end">Watch &#8594;</text>

  <!-- Progress indicator -->
  <text x="24" y="378" font-size="11" fill="#999999">2 of 4 requirements completed</text>
  <!-- Mini progress bar -->
  <rect x="24"  y="384" width="200" height="4" fill="#e5e7eb"/>
  <rect x="24"  y="384" width="100" height="4" fill="#22c55e"/>

  <!-- Section divider -->
  <line x1="0" y1="402" x2="680" y2="402" stroke="#000000" stroke-width="1.5"/>

  <!-- ── QUALIFICATION EXAM CARD (402..490) ── -->
  <rect x="24" y="414" width="632" height="96" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>

  <text x="48" y="440" font-size="15" font-weight="700" fill="#000000">Qualification Exam</text>

  <!-- Lock icon indicator (incomplete prerequisites) -->
  <rect x="570" y="424" width="72" height="24" rx="4" fill="#e5e7eb"/>
  <text x="606" y="440" font-size="10" fill="#999999" text-anchor="middle">&#128274; Locked</text>

  <text x="48" y="460" font-size="11" fill="#555555">20 questions &#183; ~15 minutes &#183; 80% pass threshold required</text>
  <text x="48" y="476" font-size="11" fill="#999999">Complete all prerequisites above to unlock the exam.</text>

  <!-- "Start" button (grayed out because locked) -->
  <rect x="48" y="488" width="220" height="32" fill="#e5e7eb"/>
  <text x="158" y="508" font-size="12" font-weight="600" fill="#999999" text-anchor="middle">Start Qualification Exam &#8594;</text>

  <!-- Section divider -->
  <line x1="0" y1="522" x2="680" y2="522" stroke="#000000" stroke-width="1.5"/>

  <!-- ── FOOTER NAV (522..540) ── -->
  <text x="24"  y="535" font-size="12" fill="#555555">&#8592; Back to Campaigns</text>

  <!-- Card outer border -->
  <rect x="0.75" y="0.75" width="678.5" height="538.5" fill="none" stroke="#000000" stroke-width="1.5"/>
</svg>
