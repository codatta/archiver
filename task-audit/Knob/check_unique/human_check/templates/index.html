<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片审核系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            padding: 10px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .image-container {
            text-align: center;
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 10px;
            position: relative;
        }
        
        .image-container img {
            max-width: 100%;
            max-height: 600px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .image-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .loading {
            font-size: 1.5em;
            color: #666;
        }
        
        .no-image {
            font-size: 1.5em;
            color: #999;
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-approve {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-reject {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-size: 1.1em;
        }
        
        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>图片审核系统</h1>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-reviewed">-</div>
                    <div class="stat-label">已审核</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-remaining">-</div>
                    <div class="stat-label">待审核</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-approved">-</div>
                    <div class="stat-label">通过</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-rejected">-</div>
                    <div class="stat-label">拒绝</div>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div id="message"></div>
            
            <div class="image-container" id="image-container">
                <div class="loading">加载中...</div>
            </div>
            
            <div class="buttons">
                <button class="btn btn-approve" id="btn-approve" onclick="review(1)" disabled>✓ 通过</button>
                <button class="btn btn-reject" id="btn-reject" onclick="review(0)" disabled>✗ 拒绝</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentImage = null;
        
        // 加载统计信息
        function loadStats() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('stat-total').textContent = data.total;
                    document.getElementById('stat-reviewed').textContent = data.reviewed;
                    document.getElementById('stat-remaining').textContent = data.remaining;
                    document.getElementById('stat-approved').textContent = data.approved;
                    document.getElementById('stat-rejected').textContent = data.rejected;
                })
                .catch(error => {
                    console.error('加载统计信息失败:', error);
                });
        }
        
        // 加载图片
        function loadImage() {
            const container = document.getElementById('image-container');
            const btnApprove = document.getElementById('btn-approve');
            const btnReject = document.getElementById('btn-reject');
            
            container.innerHTML = '<div class="loading">加载中...</div>';
            btnApprove.disabled = true;
            btnReject.disabled = true;
            
            fetch('/api/get_image')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        currentImage = data;
                        const imageUrl = '/images/' + data.image_path;
                        
                        container.innerHTML = `
                            <div class="image-info">
                                ID: ${data.submission_id}<br>
                                Result: ${data.result || 'N/A'}<br>
                                剩余: ${data.remaining} 张
                            </div>
                            <img src="${imageUrl}" alt="${data.filename}" onload="enableButtons()" onerror="handleImageError()">
                        `;
                        
                        loadStats();
                    } else {
                        container.innerHTML = `<div class="no-image">${data.message}</div>`;
                        showMessage(data.message, 'info');
                    }
                })
                .catch(error => {
                    console.error('加载图片失败:', error);
                    container.innerHTML = '<div class="no-image">加载失败，请刷新页面重试</div>';
                    showMessage('加载失败: ' + error.message, 'error');
                });
        }
        
        function enableButtons() {
            document.getElementById('btn-approve').disabled = false;
            document.getElementById('btn-reject').disabled = false;
        }
        
        function handleImageError() {
            const container = document.getElementById('image-container');
            container.innerHTML = '<div class="no-image">图片加载失败</div>';
            showMessage('图片加载失败，请检查文件路径', 'error');
        }
        
        // 审核
        function review(result) {
            if (!currentImage) {
                return;
            }
            
            const btnApprove = document.getElementById('btn-approve');
            const btnReject = document.getElementById('btn-reject');
            
            btnApprove.disabled = true;
            btnReject.disabled = true;
            
            fetch('/api/review', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    submission_id: currentImage.submission_id,
                    result: result
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const resultText = result === 1 ? '通过' : '拒绝';
                    showMessage(`已标记为${resultText}，正在加载下一张...`, 'success');
                    
                    // 延迟一下再加载下一张，让用户看到反馈
                    setTimeout(() => {
                        loadImage();
                    }, 500);
                } else {
                    showMessage('保存失败: ' + data.message, 'error');
                    enableButtons();
                }
            })
            .catch(error => {
                console.error('提交审核失败:', error);
                showMessage('提交失败: ' + error.message, 'error');
                enableButtons();
            });
        }
        
        // 显示消息
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message message-' + type;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
        
        // 键盘快捷键
        document.addEventListener('keydown', function(event) {
            if (event.key === '1' || event.key === 'Enter') {
                if (!document.getElementById('btn-approve').disabled) {
                    review(1);
                }
            } else if (event.key === '0' || event.key === ' ') {
                event.preventDefault();
                if (!document.getElementById('btn-reject').disabled) {
                    review(0);
                }
            }
        });
        
        // 初始化
        loadStats();
        loadImage();
    </script>
</body>
</html>
